name: Release

# Publishes to PyPI via trusted publishing (OIDC — no stored token) whenever
# a GitHub release is published. One-time setup on pypi.org:
#   project composeai -> Manage -> Publishing -> add GitHub publisher with
#   this repo's owner/name, workflow "release.yml", environment "pypi".

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: ruff check src tests examples
      - run: pyright
      # mypy: best-effort cross-checker smoke over the typing surface only,
      # NEVER blocking (divergences documented in tests/typing_surface.py).
      - run: 'mypy tests/typing_surface.py || echo "mypy (best-effort, non-blocking) -- divergences above are documented in tests/typing_surface.py"'

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
